services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-polybot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-polybot_dev}
      POSTGRES_DB: ${POSTGRES_DB:-polybot}
      # Tune for low-memory container
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    command: >
      postgres
        -c shared_buffers=64MB
        -c effective_cache_size=128MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c max_connections=50
        -c wal_buffers=4MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c log_min_duration_statement=2000
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polybot"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
        --tcp-keepalive 60
        --timeout 300
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.5"
        reservations:
          memory: 64M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONMALLOC=malloc
      # Research mode: kill switch disabled so direct_copy/high_conviction keep trading for data
      - STRATEGY_RESEARCH_MODE=true
      # Risk / position limits — tunable without rebuild
      - MAX_OPEN_POSITIONS_GLOBAL=40
      - MAX_POSITIONS_PER_WALLET=3
      # Cost regime filters — primary gate for cost/gross ratio
      - MIN_CONF_EDGE=0.005
      - MAX_SPREAD_TO_EDGE=0.6
      - MAX_SPREAD_ABS=0.08
      - MIN_DEPTH_USD=100.0
      # Copy-trade edge model: wallet quality → probability boost
      - COPY_EDGE_BOOST=0.30
      # Paper-trade cost realism (lower for simulation)
      - EDGE_SLIPPAGE=0.002
      - EDGE_FILL_RISK=0.001
      # Dislocation strategy thresholds
      - DISLO_MIN_Z=2.0
      - DISLO_MIN_EDGE=0.01
      - DISLO_MIN_DEPTH=50.0
      - DISLO_MAX_SPREAD=0.03
      # Ingestion performance: smaller batches = less peak memory
      - WALLET_INGEST_BATCH_SIZE=3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "find /app -name '__pycache__' -type d | xargs rm -rf 2>/dev/null; alembic upgrade head && python -m app.seed.run_seed; python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --loop asyncio"
    deploy:
      resources:
        limits:
          memory: 3500M
          cpus: "2.0"
        reservations:
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3000"
    env_file:
      - .env
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
      - NODE_OPTIONS=--max-old-space-size=512
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev -- --hostname 0.0.0.0
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.5"
        reservations:
          memory: 128M

volumes:
  pgdata:
